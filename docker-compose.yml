x-app-common: &app-common
  build:
    context: .
    dockerfile: docker/Dockerfile
    args:
      ENABLE_PADDLE: ${DOCKER_ENABLE_PADDLE:-false}
  env_file: .env
  environment: &app-env
    DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/docai
    REDIS_URL: redis://redis:6379/0
    UPLOAD_DIR: /app/data/uploads
    PROCESSED_DIR: /app/data/processed
    PADDLE_PDX_CACHE_HOME: /app/data/paddle-cache
    LLM_MODEL_PATH: /app/models/qwen3-4b-instruct-2507-q5_k_m.gguf
    ALLOWED_INPUT_ROOTS: /app/data
  volumes: &app-volumes
    - app-data:/app/data
    - ./models:/app/models:ro
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docai
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  api:
    <<: *app-common
    command: ["api"]
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    <<: *app-common
    command: ["worker"]
    volumes:
      - app-data:/app/data
      - ./models:/app/models:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  streamlit:
    <<: *app-common
    command: ["streamlit"]
    ports:
      - "127.0.0.1:8501:8501"
    environment:
      <<: *app-env
      API_BASE_URL: http://api:8000
    depends_on:
      - api

volumes:
  pgdata:
  app-data:
